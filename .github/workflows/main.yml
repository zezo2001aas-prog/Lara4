name: build

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-13

    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: setup xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: show xcode version
        run: xcodebuild -version

      - name: install ldid
        run: brew install ldid

      - name: build IPA
        working-directory: Lara3-fixed
        run: |
          chmod +x ipabuild.sh
          ./ipabuild.sh || {
            echo "=== BUILD FAILED ==="
            if [ -f build/xcodebuild.log ]; then
              echo "=== Last 200 lines of xcodebuild.log ==="
              tail -200 build/xcodebuild.log
            fi
            exit 1
          }

      - name: verify IPA
        working-directory: Lara3-fixed
        run: |
          echo "[*] IPA size:"
          ls -lh build/lara.ipa
          echo "[*] Payload contents:"
          unzip -l build/lara.ipa | grep -E "\.app/|Frameworks/" | head -30
          echo "[*] Entitlements in binary:"
          unzip -p build/lara.ipa Payload/lara.app/lara > /tmp/lara_bin
          ldid -e /tmp/lara_bin || true

      - name: upload xcodebuild log (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xcodebuild-log
          path: Lara3-fixed/build/xcodebuild.log
          if-no-files-found: ignore

      - name: upload release IPA
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: release-ipa
          path: Lara3-fixed/build/lara.ipa

  release:
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: download IPA
        uses: actions/download-artifact@v4
        with:
          name: release-ipa
          path: build/

      - name: get recent commits
        run: |
          COMMITS=$(git log -5 --pretty=format:'- %h %s (%an)')
          if [ -z "$COMMITS" ]; then
            COMMITS=$(git log -5 --pretty=format:'- %h %s (%an)')
          fi
          echo "COMMITS<<EOF" >> $GITHUB_ENV
          echo "$COMMITS" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: update nightly release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view nightly >/dev/null 2>&1 || \
            gh release create nightly \
              --title 'Nightly' \
              --notes 'nightly build' \
              --prerelease
          gh release edit nightly \
            --title "Nightly ($(date -u '+%Y-%m-%d %H:%M UTC'))" \
            --notes "$(printf '## lara nightly\n\n**ProcessLayer:** VALID/PARTIAL/DEGRADED/INVALID quality tiers\n**Entitlements:** no-sandbox + proc_info-allow embedded via ldid\n\n### Recent commits\n%s' "$COMMITS")" \
            --prerelease
          gh release upload nightly build/lara.ipa --clobber
